<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquimia dos Sabores - Cardápio Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8B4513;
            --secondary: #D4A373;
            --accent: #25D366;
            --dark: #2C1810;
            --light: #F5E6D3;
            --gold: #D4AF37;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #F5E6D3 0%, #E8D5C4 100%);
            color: var(--dark);
            padding-bottom: 80px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%);
            color: white;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 4px 12px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 16px;
        }

        .whatsapp-info {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 12px;
            margin-top: 12px;
            font-size: 13px;
        }

        .whatsapp-info strong {
            color: var(--accent);
        }

        .cta-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 211, 102, 0.4);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 12px var(--shadow);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px var(--shadow);
            border-color: var(--secondary);
        }

        .product-card.special {
            background: linear-gradient(135deg, #FFF9E6 0%, #FFE8CC 100%);
            border: 2px solid var(--gold);
        }

        .special-badge {
            display: inline-block;
            background: var(--gold);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 12px;
            line-height: 1.4;
            min-height: 44px;
        }

        .product-description {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
        }

        .product-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
        }

        .add-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-button:hover {
            background: #1ea952;
            transform: scale(1.05);
        }

        .add-button:active {
            transform: scale(0.95);
        }

        .cart-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .cart-float:hover {
            transform: scale(1.1);
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-content {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            position: relative;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--secondary);
        }

        .cart-header h2 {
            font-size: 24px;
            color: var(--primary);
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .close-cart:hover {
            color: var(--primary);
        }

        .cart-empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .cart-items {
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f9f9f9;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 600;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qty-button {
            background: var(--secondary);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .qty-button:hover {
            background: var(--primary);
        }

        .qty-display {
            font-weight: 700;
            font-size: 16px;
            min-width: 30px;
            text-align: center;
        }

        .remove-button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .remove-button:hover {
            background: #c0392b;
        }

        .cart-total {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-total-label {
            font-size: 18px;
            font-weight: 600;
        }

        .cart-total-value {
            font-size: 28px;
            font-weight: 700;
        }

        .checkout-button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .checkout-button:hover {
            background: #1ea952;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 211, 102, 0.3);
        }

        .checkout-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--accent);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
            text-decoration: none;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
        }

        .toast {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 3000;
            font-weight: 600;
        }

        .toast.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .cart-content {
                max-width: 100%;
                border-radius: 20px 20px 0 0;
            }

            .section-title {
                font-size: 20px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card {
            animation: fadeInUp 0.5s ease;
        }

        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.15s; }
        .product-card:nth-child(3) { animation-delay: 0.2s; }
        .product-card:nth-child(4) { animation-delay: 0.25s; }
        .product-card:nth-child(5) { animation-delay: 0.3s; }
        .product-card:nth-child(6) { animation-delay: 0.35s; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>Alquimia dos Sabores</h1>
        <p>Cardápio Digital</p>
        <div class="whatsapp-info">
            📲 <strong>Peça pelo WhatsApp</strong><br>
            🚀 Delivery ou retirada no local
        </div>
        <button class="cta-button" onclick="scrollToMenu()">🚀 PEDIR AGORA</button>
    </div>

    <!-- Main Container -->
    <div class="container" id="menuSection">
        <!-- Porções -->
        <div class="section">
            <h2 class="section-title">🍽️ Porções</h2>
            <div class="products-grid" id="porcoes-grid"></div>
        </div>

        <!-- Lanches -->
        <div class="section">
            <h2 class="section-title">🥪 Lanches</h2>
            <div class="products-grid" id="lanches-grid"></div>
        </div>

        <!-- Frios -->
        <div class="section">
            <h2 class="section-title">🧀 Frios</h2>
            <div class="products-grid" id="frios-grid"></div>
        </div>

        <!-- Caldos -->
        <div class="section">
            <h2 class="section-title">🥣 Caldos</h2>
            <div class="products-grid" id="caldos-grid"></div>
        </div>
    </div>

    <!-- Cart Float Button -->
    <div class="cart-float" onclick="toggleCart()">
        🛒
        <span class="cart-badge" id="cartBadge">0</span>
    </div>

    <!-- WhatsApp Float Button -->
    <a href="https://wa.me/5511925112144" target="_blank" class="whatsapp-float">📱</a>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Meu Pedido</h2>
                <button class="close-cart" onclick="toggleCart()">×</button>
            </div>
            
            <div id="cartItemsContainer">
                <div class="cart-empty">
                    <p>Seu carrinho está vazio</p>
                    <p style="font-size: 14px; margin-top: 8px;">Adicione itens para começar!</p>
                </div>
            </div>

            <div id="cartFooter" style="display: none;">
                <div class="cart-total">
                    <div class="cart-total-row">
                        <span class="cart-total-label">Total</span>
                        <span class="cart-total-value" id="cartTotal">R$ 0,00</span>
                    </div>
                </div>
                <button class="checkout-button" onclick="sendWhatsApp()">
                    📲 Finalizar Pedido no WhatsApp
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">Item adicionado!</div>

    <script>
        // Products Data
        const products = {
            porcoes: [
                { id: 1, name: 'Contra filé acebolado com batata frita', price: 30, special: false },
                { id: 2, name: 'Costelinha suína com batata frita', price: 30, special: false },
                { id: 3, name: 'Costelinha suína com mandioca', price: 30, special: false },
                { id: 4, name: 'Frango a passarinho com batata frita', price: 30, special: false },
                { id: 5, name: 'Isca de frango com batata frita', price: 30, special: false },
                { id: 6, name: 'Tulipa com mandioca frita', price: 30, special: false },
                { id: 7, name: 'Calabresa acebolada com batata frita', price: 30, special: false },
                { id: 8, name: 'Batata frita', price: 30, special: false },
                { id: 9, name: 'Batata frita com bacon, cheddar e calabresa', price: 30, special: false },
                { id: 10, name: 'Mandioca frita', price: 30, special: false },
                { id: 11, name: 'Isca de tilápia / Posta de tilápia', price: 30, special: false },
                { id: 12, name: 'Tilápia frita inteira / Manjubinha', price: 30, special: false },
                { id: 13, name: 'Coração na chapa com cebola', price: 30, special: false },
                { id: 14, name: 'Moela empanada ou ao molho', price: 30, special: false },
                { 
                    id: 15, 
                    name: 'Barca Especial do Alquimia', 
                    price: 35, 
                    special: true,
                    description: 'Contra filé acebolado, tulipa, calabresa, isca de peixe, batata frita, azeitonas e pimenta biquinho'
                }
            ],
            lanches: [
                { id: 16, name: 'Lanche de Pernil com queijo e vinagrete', price: 30 },
                { id: 17, name: 'Lanche de linguiça com queijo e vinagrete', price: 30 }
            ],
            frios: [
                { id: 18, name: 'Barca de Frios', price: 30 }
            ],
            caldos: [
                { id: 19, name: 'Caldo de Mocotó', price: 30 },
                { id: 20, name: 'Caldo de Feijão com Bacon', price: 30 },
                { id: 21, name: 'Caldo de Vaca Atolada', price: 30 },
                { id: 22, name: 'Caldo de Costela', price: 30 },
                { id: 23, name: 'Caldo de Abóbora', price: 30 },
                { id: 24, name: 'Caldo Verde', price: 30 },
                { id: 25, name: 'Caldo de Mandioca com bacon e calabresa', price: 30 },
                { id: 26, name: 'Caldo de Mandioquinha', price: 30 },
                { id: 27, name: 'Caldo de Quenga', price: 30 },
                { id: 28, name: 'Caldo de Peixe', price: 30 }
            ]
        };

        // Cart State
        let cart = [];

        // Render Products
        function renderProducts() {
            Object.keys(products).forEach(category => {
                const grid = document.getElementById(`${category}-grid`);
                products[category].forEach(product => {
                    const card = createProductCard(product);
                    grid.appendChild(card);
                });
            });
        }

        // Create Product Card
        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = `product-card ${product.special ? 'special' : ''}`;
            
            card.innerHTML = `
                ${product.special ? '<span class="special-badge">🔥 Destaque</span>' : ''}
                <div class="product-name">${product.name}</div>
                ${product.description ? `<div class="product-description">${product.description}</div>` : ''}
                <div class="product-footer">
                    <div class="product-price">R$ ${product.price.toFixed(2).replace('.', ',')}</div>
                    <button class="add-button" onclick="addToCart(${product.id})">Adicionar</button>
                </div>
            `;
            
            return card;
        }

        // Add to Cart
        function addToCart(productId) {
            const product = findProductById(productId);
            if (!product) return;

            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1
                });
            }

            updateCart();
            showToast('Item adicionado!');
        }

        // Find Product by ID
        function findProductById(id) {
            for (let category in products) {
                const product = products[category].find(p => p.id === id);
                if (product) return product;
            }
            return null;
        }

        // Update Cart
        function updateCart() {
            const badge = document.getElementById('cartBadge');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            badge.textContent = totalItems;

            renderCartItems();
        }

        // Render Cart Items
        function renderCartItems() {
            const container = document.getElementById('cartItemsContainer');
            const footer = document.getElementById('cartFooter');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <p>Seu carrinho está vazio</p>
                        <p style="font-size: 14px; margin-top: 8px;">Adicione itens para começar!</p>
                    </div>
                `;
                footer.style.display = 'none';
                return;
            }

            footer.style.display = 'block';

            const itemsHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">R$ ${item.price.toFixed(2).replace('.', ',')}</div>
                    </div>
                    <div class="cart-item-controls">
                        <button class="qty-button" onclick="decreaseQuantity(${item.id})">−</button>
                        <span class="qty-display">${item.quantity}</span>
                        <button class="qty-button" onclick="increaseQuantity(${item.id})">+</button>
                        <button class="remove-button" onclick="removeFromCart(${item.id})">Remover</button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `<div class="cart-items">${itemsHTML}</div>`;

            // Update total
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        // Increase Quantity
        function increaseQuantity(productId) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity++;
                updateCart();
            }
        }

        // Decrease Quantity
        function decreaseQuantity(productId) {
            const item = cart.find(i => i.id === productId);
            if (item && item.quantity > 1) {
                item.quantity--;
                updateCart();
            }
        }

        // Remove from Cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        // Toggle Cart Modal
        function toggleCart() {
            const modal = document.getElementById('cartModal');
            modal.classList.toggle('active');
        }

        // Close cart when clicking outside
        document.getElementById('cartModal').addEventListener('click', function(e) {
            if (e.target === this) {
                toggleCart();
            }
        });

        // Send to WhatsApp
        function sendWhatsApp() {
            if (cart.length === 0) {
                alert('Adicione itens ao carrinho primeiro!');
                return;
            }

            const phone = '5511925112144';
            let message = 'Olá! Gostaria de fazer um pedido:\n\n';

            cart.forEach(item => {
                message += `• ${item.quantity}x ${item.name}\n`;
            });

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `\n*Total: R$ ${total.toFixed(2).replace('.', ',')}*`;

            const encodedMessage = encodeURIComponent(message);
            const whatsappURL = `https://wa.me/${phone}?text=${encodedMessage}`;

            window.open(whatsappURL, '_blank');
        }

        // Show Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Scroll to Menu
        function scrollToMenu() {
            document.getElementById('menuSection').scrollIntoView({ behavior: 'smooth' });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
        });
    </script>
</body>
</html>
